<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sparsh — Wallflow Studio</title>
<meta name="description" content="Sparsh · Wallflow Studio — web design & development.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

  /* ============================================================
     EDIT YOUR LINKS HERE — nothing else in this file needs touching.
     Each entry: label, url, tag (small text on the right, optional).
     ============================================================ */

</style>
</head>
<body>

<video class="bg-video" id="bgVideo" autoplay muted loop playsinline poster="poster.jpg">
  <source src="background.mp4" type="video/mp4">
</video>
<div class="bg-overlay" aria-hidden="true"></div>

<div class="scene">
  <div class="card">

    <div class="mark" aria-hidden="true">
      <svg viewBox="0 0 48 48" width="40" height="40">
        <path d="M24 4 L44 24 L24 44 L4 24 Z" fill="none" stroke="#C9A227" stroke-width="1.2"/>
        <circle cx="24" cy="24" r="3" fill="#C9A227"/>
      </svg>
    </div>

    <h1 class="name">Sparsh</h1>
    <p class="tagline">web design &amp; development</p>

    <nav class="flow" id="flow" aria-label="Links">
      <!-- populated by JS from LINKS below -->
    </nav>

    <div class="socials" id="socials"></div>

    <p class="foot">wallflow.in</p>
  </div>
</div>

<script>

  // ------------------------------------------------------------
  // EDIT THESE — add, remove, or reorder as needed.
  // tag is optional (shows small text on the right of the row).
  // ------------------------------------------------------------
  const LINKS = [
    { label: "Portfolio", tag: "projects", children: [
        { label: "Sole & Sale — Family Kitchen & Café", url: "https://restrauntdemo.lovable.app/" },
        { label: "U Shine Makeover Salon", url: "https://ushine.in" },
      ]
    },
    { label: "Start a project", url: "mailto:sparshy66@gmail.com", tag: "email" },
    { label: "See recent builds", url: "https://github.com/sparshy66-eng", tag: "github" },
  ];

  const SOCIALS = [
    { label: "Instagram", url: "https://instagram.com/exe_sparsh.01",
      path: "M12 2c-2.7 0-3 .01-4.05.06-1.05.05-1.77.22-2.4.46a4.85 4.85 0 0 0-1.75 1.14A4.85 4.85 0 0 0 2.66 5.4c-.24.63-.4 1.35-.46 2.4C2.15 8.85 2.14 9.15 2.14 12s.01 3.15.06 4.2c.05 1.05.22 1.77.46 2.4.25.65.58 1.2 1.13 1.75.55.55 1.1.88 1.75 1.13.63.24 1.35.4 2.4.46 1.05.05 1.35.06 4.06.06s3-.01 4.05-.06c1.05-.05 1.77-.22 2.4-.46a4.85 4.85 0 0 0 1.75-1.13 4.85 4.85 0 0 0 1.13-1.75c.24-.63.4-1.35.46-2.4.05-1.05.06-1.35.06-4.2s-.01-3.15-.06-4.2c-.05-1.05-.22-1.77-.46-2.4a4.85 4.85 0 0 0-1.13-1.75A4.85 4.85 0 0 0 18.6 2.52c-.63-.24-1.35-.4-2.4-.46C15.15 2.01 14.85 2 12 2zm0 1.8c2.65 0 2.97.01 4 .06.97.05 1.5.2 1.85.34.46.18.8.4 1.15.75.35.35.57.68.75 1.15.14.35.3.88.34 1.85.05 1.03.06 1.35.06 4s-.01 2.97-.06 4c-.05.97-.2 1.5-.34 1.85-.18.46-.4.8-.75 1.15-.35.35-.68.57-1.15.75-.35.14-.88.3-1.85.34-1.03.05-1.34.06-4 .06s-2.97-.01-4-.06c-.97-.05-1.5-.2-1.85-.34a3.05 3.05 0 0 1-1.15-.75 3.05 3.05 0 0 1-.75-1.15c-.14-.35-.3-.88-.34-1.85-.05-1.03-.06-1.34-.06-4s.01-2.97.06-4c.05-.97.2-1.5.34-1.85.18-.46.4-.8.75-1.15.35-.35.68-.57 1.15-.75.35-.14.88-.3 1.85-.34 1.03-.05 1.35-.06 4-.06zm0 3.5a4.7 4.7 0 1 0 0 9.4 4.7 4.7 0 0 0 0-9.4zm0 7.75a3.05 3.05 0 1 1 0-6.1 3.05 3.05 0 0 1 0 6.1zm5.9-7.95a1.1 1.1 0 1 1-2.2 0 1.1 1.1 0 0 1 2.2 0z" },
    { label: "GitHub", url: "https://github.com/sparshy66-eng",
      path: "M12 2C6.48 2 2 6.58 2 12.25c0 4.53 2.87 8.37 6.84 9.72.5.1.68-.22.68-.49 0-.24-.01-1.03-.01-1.87-2.78.62-3.37-1.21-3.37-1.21-.46-1.2-1.11-1.52-1.11-1.52-.9-.63.07-.62.07-.62 1 .07 1.53 1.05 1.53 1.05.89 1.56 2.34 1.11 2.91.85.09-.66.35-1.11.63-1.37-2.22-.26-4.56-1.14-4.56-5.06 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.31.1-2.72 0 0 .84-.28 2.75 1.05a9.3 9.3 0 0 1 5 0c1.9-1.33 2.74-1.05 2.74-1.05.56 1.41.2 2.46.1 2.72.65.72 1.03 1.63 1.03 2.75 0 3.93-2.34 4.79-4.57 5.05.36.32.68.94.68 1.9 0 1.37-.01 2.47-.01 2.81 0 .27.18.6.69.49A10.03 10.03 0 0 0 22 12.25C22 6.58 17.52 2 12 2z" },
    { label: "Email", url: "mailto:sparshy66@gmail.com",
      path: "M2 5.5A1.5 1.5 0 0 1 3.5 4h17A1.5 1.5 0 0 1 22 5.5v13a1.5 1.5 0 0 1-1.5 1.5h-17A1.5 1.5 0 0 1 2 18.5v-13zm2.1.3 7.4 5.7a.8.8 0 0 0 1 0l7.4-5.7H4.1zm-.1 1.6v10.9h16V7.4l-7.16 5.5a2.3 2.3 0 0 1-2.68 0L4 7.4z" },
  ];

  const flow = document.getElementById("flow");
  LINKS.forEach((l, i) => {
    if (l.children) {
      const wrap = document.createElement("div");
      wrap.className = "group";
      wrap.style.setProperty("--i", i);

      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "row toggle";
      btn.innerHTML = `
        <span class="node"></span>
        <span class="row-label">${l.label}</span>
        ${l.tag ? `<span class="row-tag">${l.tag}</span>` : ""}
        <svg class="row-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>`;

      const sub = document.createElement("div");
      sub.className = "sub";
      l.children.forEach((c, j) => {
        const a = document.createElement("a");
        a.className = "subrow";
        a.href = c.url;
        a.target = c.url.startsWith("mailto:") ? "_self" : "_blank";
        a.rel = "noopener";
        a.style.setProperty("--j", j);
        a.innerHTML = `
          <span class="subnode"></span>
          <span class="row-label">${c.label}</span>
          <svg class="row-arrow" width="13" height="13" viewBox="0 0 24 24" fill="none">
            <path d="M7 17L17 7M17 7H9M17 7V15" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>`;
        sub.appendChild(a);
      });

      btn.addEventListener("click", () => {
        const open = wrap.classList.toggle("open");
        sub.style.maxHeight = open ? sub.scrollHeight + "px" : "0px";
      });

      wrap.appendChild(btn);
      wrap.appendChild(sub);
      flow.appendChild(wrap);
      return;
    }

    const a = document.createElement("a");
    a.className = "row";
    a.href = l.url;
    a.target = l.url.startsWith("mailto:") ? "_self" : "_blank";
    a.rel = "noopener";
    a.style.setProperty("--i", i);
    a.innerHTML = `
      <span class="node"></span>
      <span class="row-label">${l.label}</span>
      ${l.tag ? `<span class="row-tag">${l.tag}</span>` : ""}
      <svg class="row-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none">
        <path d="M7 17L17 7M17 7H9M17 7V15" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`;
    flow.appendChild(a);
  });

  const socials = document.getElementById("socials");
  SOCIALS.forEach(s => {
    const a = document.createElement("a");
    a.className = "social";
    a.href = s.url;
    a.target = "_blank";
    a.rel = "noopener";
    a.setAttribute("aria-label", s.label);
    a.innerHTML = `<svg viewBox="0 0 24 24" width="18" height="18"><path d="${s.path}" fill="currentColor"/></svg>`;
    socials.appendChild(a);
  });
</script>

<style>
  :root{
    --bg: #0b0b0c;
    --ink: #ede8df;
    --ink-dim: #8a857a;
    --brass: #c9a227;
    --line: #232220;
  }
  *{ box-sizing: border-box; }
  html, body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }
  body{
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding: 10vh 20px 6vh;
  }
  .scene{ width: 100%; max-width: 420px; }
  .card{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    opacity:0;
    animation: rise .7s ease forwards;
  }
  @keyframes rise{
    from{ opacity:0; transform: translateY(10px); }
    to{ opacity:1; transform: translateY(0); }
  }
  .mark{ margin-bottom: 18px; }
  .name{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size: 32px;
    letter-spacing: 0.2px;
    margin: 0;
  }
  .tagline{
    font-size: 13px;
    color: var(--ink-dim);
    font-family:'JetBrains Mono', monospace;
    letter-spacing: 0.3px;
    margin: 8px 0 44px;
  }
  .flow{
    width:100%;
    position:relative;
    display:flex;
    flex-direction:column;
  }
  .flow::before{
    content:"";
    position:absolute;
    left: 9px;
    top: 14px;
    bottom: 14px;
    width: 1px;
    background: linear-gradient(var(--line), var(--brass), var(--line));
    opacity:.35;
  }
  .row{
    position:relative;
    display:flex;
    align-items:center;
    gap:14px;
    padding: 18px 8px 18px 28px;
    text-decoration:none;
    color: var(--ink);
    border-bottom: 1px solid var(--line);
    opacity:0;
    animation: rise .5s ease forwards;
    animation-delay: calc(0.35s + var(--i) * 0.08s);
    transition: padding-left .25s ease, color .25s ease;
  }
  .row:first-child{ border-top: 1px solid var(--line); }
  .node{
    position:absolute;
    left: 4px;
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--bg);
    border: 1.4px solid var(--ink-dim);
    transition: border-color .25s ease, background .25s ease, box-shadow .25s ease;
  }
  .row:hover .node, .row:focus-visible .node{
    border-color: var(--brass);
    background: var(--brass);
    box-shadow: 0 0 0 3px rgba(201,162,39,0.15);
  }
  .row:hover, .row:focus-visible{
    padding-left: 34px;
    color: var(--ink);
  }
  .row:focus-visible{ outline: none; }
  .row-label{
    font-size: 15px;
    font-weight: 500;
    flex: 1;
  }
  .row-tag{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.2px;
  }
  .row-arrow{
    color: var(--ink-dim);
    transform: translate(-2px, 2px) rotate(0deg);
    opacity: 0;
    transition: opacity .25s ease, transform .25s ease, color .25s ease;
    flex-shrink:0;
  }
  .row:hover .row-arrow, .row:focus-visible .row-arrow{
    opacity: 1;
    color: var(--brass);
    transform: translate(0,0);
  }
  .group{
    position:relative;
    opacity:0;
    animation: rise .5s ease forwards;
    animation-delay: calc(0.35s + var(--i) * 0.08s);
  }
  .toggle{
    width:100%;
    background:none;
    border:none;
    border-bottom: 1px solid var(--line);
    cursor:pointer;
    font-family:'Inter', sans-serif;
    animation:none;
    opacity:1;
  }
  .group:first-child .toggle{ border-top: 1px solid var(--line); }
  .row-chevron{
    color: var(--ink-dim);
    flex-shrink:0;
    transition: transform .3s ease, color .25s ease;
  }
  .group.open .row-chevron{
    transform: rotate(180deg);
    color: var(--brass);
  }
  .group.open .node{
    border-color: var(--brass);
    background: var(--brass);
  }
  .sub{
    max-height:0;
    overflow:hidden;
    transition: max-height .35s ease;
  }
  .subrow{
    position:relative;
    display:flex;
    align-items:center;
    gap:14px;
    padding: 14px 8px 14px 44px;
    text-decoration:none;
    color: var(--ink-dim);
    border-bottom: 1px solid var(--line);
    font-size: 14px;
    transition: padding-left .25s ease, color .25s ease;
  }
  .subrow:hover, .subrow:focus-visible{
    padding-left: 50px;
    color: var(--ink);
  }
  .subrow:focus-visible{ outline: none; }
  .subnode{
    position:absolute;
    left: 22px;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--ink-dim);
    transition: background .25s ease;
  }
  .subrow:hover .subnode, .subrow:focus-visible .subnode{
    background: var(--brass);
  }
  .subrow .row-arrow{ margin-left:auto; }
  .socials{
    display:flex;
    gap: 22px;
    margin-top: 38px;
  }
  .social{
    color: var(--ink-dim);
    display:flex;
    transition: color .25s ease, transform .25s ease;
  }
  .social:hover{ color: var(--brass); transform: translateY(-2px); }
  .foot{
    margin-top: 30px;
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--line);
    letter-spacing: 1px;
  }
  @media (prefers-reduced-motion: reduce){
    .card, .row{ animation: none; opacity:1; }
  }
  .bg-video{
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: -2;
    pointer-events: none;
    background: var(--bg);
  }
  .bg-overlay{
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background:
      linear-gradient(180deg, rgba(11,11,12,0.55) 0%, rgba(11,11,12,0.72) 40%, rgba(11,11,12,0.88) 100%);
  }
</style>

</body>
</html>
